<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>沿線案内 スマートフォン全画面アプリ (CSVデータ完全反映版)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans JP', 'sans-serif'],
                        mono: ['Roboto Mono', 'monospace'],
                    },
                    colors: {
                        appDark: '#000000',
                        appCard: '#111622',
                        appBorder: '#1e2638',
                        railBlue: '#2563eb',
                        railOrange: '#ff8c00',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #000000;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .map-shadow {
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 1000;
        }

        .rotated-map .leaflet-map-pane {
            transform-origin: center;
            transition: transform 0.15s ease-out;
        }

        .rotated-map .leaflet-marker-icon .fix-rotate {
            transition: transform 0.15s ease-out;
        }

        @keyframes pulse-arrow {
            0%, 100% { transform: scale(1) rotate(135deg); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.8; }
        }
        .current-arrow-animate {
            animation: pulse-arrow 1.8s infinite ease-in-out;
        }
    </style>
</head>
<body class="w-full h-[100dvh] bg-appDark text-slate-100 flex flex-col justify-between overflow-hidden">

    <!-- 東海道線オレンジライン -->
    <div class="w-full h-[5px] bg-railOrange shrink-0"></div>

    <!-- 1. 最上部ヘッダー部 -->
    <div class="bg-appDark pt-1.5 px-4 pb-2 z-20 shrink-0 select-none">
        
        <!-- 路線名、GPS/デモ切り替えスイッチ -->
        <div class="flex items-center justify-between mb-1">
            <div class="flex items-center gap-1.5">
                <!-- 💡 JTナンバリングの横幅を伸ばして綺麗な正方形(w-7 h-7)に修正 -->
                <div class="w-7 h-7 bg-white border border-orange-500 rounded flex items-center justify-center shadow-sm shrink-0">
                    <span class="text-appDark font-black text-xs font-mono tracking-tighter">JT</span>
                </div>
                <h1 class="text-[13px] font-black tracking-wide text-white">東海道線（JR東日本）</h1>
            </div>
            
            <div class="flex bg-slate-900 border border-slate-700/50 p-0.5 rounded-lg text-[9px]">
                <button id="toggle-gps" onclick="setMode('gps')" class="px-2 py-0.5 rounded font-bold transition-all text-slate-400">GPS</button>
                <button id="toggle-demo" onclick="setMode('demo')" class="px-2 py-0.5 rounded font-bold transition-all bg-railBlue text-white shadow">デモ</button>
            </div>
        </div>

        <!-- 全体距離・進捗プログレスバー -->
        <div class="relative w-full h-1 bg-slate-800 rounded-full mb-1.5 mt-2.5">
            <div id="ui-main-progress" class="absolute h-full bg-railBlue rounded-full" style="width: 0%;"></div>
            <div id="ui-progress-dot" class="absolute w-2 h-2 bg-white rounded-full top-1/2 -translate-y-1/2 shadow-[0_0_6px_#fff]" style="left: 0%;"></div>
            <span id="ui-distance-label" class="absolute right-0 -top-4 text-[9px] text-blue-400 font-mono font-bold">0.0km</span>
            <div class="absolute w-full flex justify-between top-1.5 px-0.5 text-[8px] text-slate-500 font-medium">
                <span class="text-blue-500 font-bold">東京</span>
                <span>横浜</span>
                <span>藤沢</span>
                <span>平塚</span>
                <span>小田原</span>
                <div class="text-right"><span class="block text-slate-400">熱海</span></div>
            </div>
        </div>

        <!-- 🌟 駅表示エリア (完全に中央揃えに改修) -->
        <div id="station-display-wrapper" class="pt-3 pb-1 px-1 min-h-[52px] flex items-center justify-center transition-all duration-300">
            <!-- 通常時（駅間走行中） -->
            <div id="mode-running" class="w-full flex justify-center items-center text-center space-x-6">
                <div class="flex flex-col items-center">
                    <span id="ui-prev-rubi" class="text-[8px] text-slate-400 font-medium tracking-wider">とうきょう</span>
                    <h2 id="ui-prev-name" class="text-xl font-black text-white tracking-tight">東京</h2>
                    <span id="ui-prev-id" class="text-[9px] text-slate-500 font-mono font-bold">JT-01</span>
                </div>
                <div class="text-railBlue flex items-center justify-center px-1">
                    <i class="fa-solid fa-chevron-right text-base"></i>
                </div>
                <div class="flex flex-col items-center">
                    <span id="ui-next-rubi" class="text-[8px] text-slate-400 font-medium tracking-wider">しんばし</span>
                    <h2 id="ui-next-name" class="text-xl font-black text-white tracking-tight">新橋</h2>
                    <span id="ui-next-id" class="text-[9px] text-slate-500 font-mono font-bold">JT-02</span>
                </div>
            </div>

            <!-- 駅到着モード (左寄せ大きな駅名 ＋ 右側に角丸紹介文) -->
            <div id="mode-arrival" class="w-full hidden flex items-center justify-between gap-3 animate-fadeIn">
                <div class="flex flex-col shrink-0">
                    <h2 id="ui-arr-name" class="text-2xl font-black text-white tracking-tight">-</h2>
                    <span id="ui-arr-id" class="text-[9px] text-slate-500 font-mono font-bold mt-0.5">-</span>
                </div>
                <!-- 各駅紹介の角丸カード (CSVデータに基づいて自動描画) -->
                <div class="flex-grow bg-blue-950/40 border border-blue-500/20 rounded-xl p-1.5 px-2.5 max-w-[72%] min-h-[42px] flex items-center shadow-inner">
                    <p id="ui-arr-description" class="text-[9.5px] text-slate-300 leading-snug font-medium"></p>
                </div>
            </div>
        </div>

        <!-- 3連ステータスカード (縦の幅をコンパクトに短縮、隙間も微調整) -->
        <div class="grid grid-cols-12 gap-1.5 mt-1.5 shrink-0">
            <div class="col-span-6 bg-appCard border border-appBorder rounded-lg p-1 flex flex-col justify-center items-center text-center">
                <span class="text-[7.5px] text-slate-400 font-medium flex items-center gap-1"><i class="fa-solid fa-location-dot text-slate-500"></i>現在地</span>
                <div id="ui-city-name" class="text-[9.5px] font-black text-slate-100 mt-0.5 whitespace-nowrap overflow-hidden text-ellipsis w-full">東京都千代田区</div>
            </div>
            <div class="col-span-3 bg-appCard border border-appBorder rounded-lg p-1 flex flex-col justify-center items-center text-center">
                <span class="text-[7.5px] text-slate-400 font-medium flex items-center gap-1"><i class="fa-solid fa-gauge-high text-slate-500"></i>速度</span>
                <div class="text-xs font-mono font-black text-slate-100 mt-0.5"><span id="ui-speed">0</span><span class="text-[7.5px] font-sans font-normal text-slate-400 ml-0.5">km</span></div>
            </div>
            <div class="col-span-3 bg-appCard border border-appBorder rounded-lg p-1 flex flex-col justify-center items-center text-center">
                <span class="text-[7.5px] text-slate-400 font-medium flex items-center gap-1"><i class="fa-solid fa-satellite-dish text-slate-500"></i>GPS</span>
                <div id="ui-gps-badge" class="text-[8px] font-bold text-blue-400 mt-0.5 bg-blue-500/10 px-1 py-0.1 rounded border border-blue-500/15 w-full">デモ</div>
            </div>
        </div>

    </div>

    <!-- 2. 地図ビュー (操作可能に設定。右下に現在地復帰ボタンを追加) -->
    <div class="relative h-[165px] w-full z-10 border-y border-appBorder overflow-hidden shrink-0">
        <div id="map" class="w-full h-full bg-slate-950 rotated-map"></div>
        <div class="map-shadow absolute inset-0"></div>
        
        <!-- フローティングデモコントローラー -->
        <div id="demo-ctrl-bar" class="absolute top-2 left-2 right-2 z-[1000] bg-[#000000]/85 backdrop-blur-md border border-slate-800 rounded-xl p-1.5 flex items-center justify-between gap-2.5 shadow-lg">
            <div class="flex items-center gap-1.5">
                <button id="btn-play-demo" onclick="toggleDemoPlay()" class="w-6 h-6 bg-railBlue rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all">
                    <i id="icon-play-demo" class="fa-solid fa-play text-[9px] text-white"></i>
                </button>
                <span class="text-[9px] text-slate-400 font-bold" id="demo-status-label">デモ 8x</span>
            </div>
            <input type="range" id="demo-slider" min="0" max="104.6" step="0.01" value="0.0" oninput="onDemoSliderChange(this.value)" class="flex-grow accent-railBlue bg-slate-800 rounded-lg appearance-none h-1 cursor-pointer">
            <span class="text-[9px] text-blue-400 font-mono font-bold" id="demo-km-label">0.0km</span>
        </div>

        <!-- 🧭 現在地復帰/コンパスボタン -->
        <button onclick="recenterMap()" class="absolute bottom-2 right-2 z-[1000] bg-slate-900/95 hover:bg-slate-800 border border-slate-700 w-8 h-8 rounded-lg flex items-center justify-center text-railOrange shadow-md active:scale-95 transition-all" title="現在地に追従">
            <i class="fa-solid fa-location-arrow text-xs"></i>
        </button>
    </div>

    <!-- 3. 下部エリア (「沿線スポット情報」という見出しラベルを完全に非表示化、左側の余白を見切れ防止に最適化) -->
    <div class="flex-grow flex flex-col overflow-hidden bg-gradient-to-b from-appDark to-[#05080e] px-4 pt-2.5 pb-4 space-y-3">
        
        <!-- 沿線スポットセクション (見切れを防ぐため、内側の安全余白を確保したスクロール構造) -->
        <div class="shrink-0 pt-0.5">
            <div id="spots-container" class="flex gap-3 overflow-x-auto pb-1 px-1 no-scrollbar snap-x scroll-pl-1">
                <!-- スポットデータがJSによってここにCSVの情報を元に動的レンダリングされます -->
            </div>
            
            <!-- 沿線スポットを一括格納する折りたたみトリガーボタンと細い線 -->
            <div class="border-t border-slate-800/80 mt-2.5 pt-1.5 flex justify-center">
                <button onclick="collapseAllSpots()" class="inline-flex items-center space-x-1.5 px-3 py-1 rounded text-[9.5px] font-bold text-slate-500 hover:text-slate-400 active:scale-95 transition-all">
                    <i class="fa-solid fa-angles-up"></i>
                    <span>すべての詳細を格納</span>
                </button>
            </div>
        </div>

        <!-- 4. 停車駅タイムライン (「停車駅・到着予想」のタイトルと「走行区間（）」の文字表記を完全カット) -->
        <div class="flex-grow flex flex-col min-h-0 pt-1">
            <div class="flex-grow overflow-y-auto pr-1 relative no-scrollbar" id="station-timeline-container">
                <div class="relative py-2" id="station-timeline">
                    <!-- 縦線ライン (左端12pxの位置に完全吸着) -->
                    <div class="absolute left-[12px] top-0 bottom-0 w-[2px] bg-slate-800 z-0"></div>
                    <!-- 21駅リストコンテナ (駅間をよりコンパクトに詰めるためスペースを space-y-1.5 に縮小) -->
                    <div id="timeline-stations" class="relative z-10 space-y-1.5"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- データベース・ロジック -->
    <script>
        // 🌟 【CSVデータ完全反映】東海道線（東京〜熱海）全21駅データ
        var stations = [
            { id: "JT-01", name: "東京", rubi: "とうきょう", km: 0.0, coords: [35.681183, 139.766758], city: "東京都千代田区", desc: "東京駅が開業したのは1914年、日本の鉄道開業（1872年）から約12年後のこと。丸の内駅舎は1945年の東京大空襲により3階部分は崩落したものの、1階・2階のレンガ壁のほとんどは建造当時のまま原型をとどめている。9番線ホーム中程には東海道線本線の起点、0キロポストがある。" },
            { id: "JT-02", name: "新橋", rubi: "しんばし", km: 2.0, coords: [35.666395, 139.758226], city: "東京都港区", desc: "1872年（明治5年）10月14日、日本初の鉄道路線が新橋〜横浜間で正式開業したことから、新橋は「日本の鉄道発祥の地」として広く知られている。駅前にはSL広場や旧新橋停車場（鉄道歴史展示室）もある。（元々の新橋駅は現在の新橋駅の位置とは異なっていた。新橋駅すぐ南側のカーブから日本最初の鉄道に合流することとなる。）" },
            { id: "JT-03", name: "品川", rubi: "しながわ", km: 6.6, coords: [35.630428, 139.739096], city: "東京都港区", desc: "旧宿場町から発展を続け、現在はリニア新幹線なども入る最先端メガターミナル。" },
            { id: "JT-04", name: "川崎", rubi: "かわさき", km: 18.5, coords: [35.531356, 139.696833], city: "神奈川県川崎市", desc: "工業地帯の発展を支えた拠点。現在は巨大ショッピングモール等が並ぶ活気ある駅。" },
            { id: "JT-05", name: "横浜", rubi: "よこはま", km: 28.8, coords: [35.465825, 139.622257], city: "神奈川県横浜市", desc: "世界的な乗降客数を誇る一大連絡口。みなとみらいや中華街への最寄り。" },
            { id: "JT-06", name: "戸塚", rubi: "とつか", km: 40.9, coords: [35.400124, 139.534414], city: "神奈川県横浜市", desc: "東海道五十三次第5の宿場町。湘南モノレール等と交差するベッドタウン。" },
            { id: "JT-07", name: "大船", rubi: "おおふな", km: 46.3, coords: [35.353823, 139.531013], city: "神奈川県鎌倉市", desc: "巨大な白亜の「大船観音」が有名。横須賀線、湘南モノレールのジャンクション。" },
            { id: "JT-08", name: "藤沢", rubi: "ふじさわ", km: 51.1, coords: [35.338851, 139.487104], city: "神奈川県藤沢市", desc: "湘南エリアの代表的中心都市。江ノ島電鉄（江ノ電）への乗り換え駅。" },
            { id: "JT-09", name: "辻堂", rubi: "つじどう", km: 54.7, coords: [35.336821, 139.447545], city: "神奈川県藤沢市", desc: "広大な「湘南テラスモール」が広がり、ファミリー層に圧倒的人気を博す再開発駅。" },
            { id: "JT-10", name: "茅ケ崎", rubi: "ちがさき", km: 58.4, coords: [35.330456, 139.407421], city: "神奈川県茅ヶ崎市", desc: "海風とサーフィン、サザンオールスターズのメロディーが響く湘南カルチャーの街。" },
            { id: "JT-11", name: "平塚", rubi: "ひらつか", km: 63.5, coords: [35.327312, 139.354109], city: "神奈川県平塚市", desc: "絢爛豪華な「湘南ひらつか七夕まつり」で知られ、かつての相模国中心部としての風格を持つ。" },
            { id: "JT-12", name: "大磯", rubi: "おおいそ", km: 67.6, coords: [35.311311, 139.314022], city: "神奈川県中郡大磯町", desc: "初代総理大臣・伊藤博文など多くの明治の元勲たちが別荘を構えた瀟洒な避暑の地。" },
            { id: "JT-13", name: "二宮", rubi: "にのみや", km: 72.8, coords: [35.299534, 139.258611], city: "神奈川県中郡二宮町", desc: "吾妻山公園から望む早咲きの菜の花と、遮るもののない富士山の山影が絶景。" },
            { id: "JT-14", name: "国府津", rubi: "こうづ", km: 77.3, coords: [35.281534, 139.215211], city: "神奈川県小田原市", desc: "御殿場線経由だった時代、すべての優等列車が補助機関車を連結した鉄道の要衝。" },
            { id: "JT-15", name: "鴨宮", rubi: "かのみや", km: 80.3, coords: [35.275912, 139.182233], city: "神奈川県小田原市", desc: "新幹線の歴史が始まった場所。「新幹線発祥の地」記念碑が静かに佇みます。" },
            { id: "JT-16", name: "小田原", rubi: "おだわら", km: 83.8, coords: [35.256111, 139.154921], city: "神奈川県小田原市", desc: "天下の険・箱根の玄関口。かつて小田原北条氏が誇った難攻不落の名城が鎮座。" },
            { id: "JT-17", name: "早川", rubi: "はやかわ", km: 86.4, coords: [35.234321, 139.143211], city: "神奈川県小田原市", desc: "日本で一番駅から近い漁港「小田原早川漁港」があり、朝市の鮮魚グルメが絶品。" },
            { id: "JT-18", name: "根府川", rubi: "ねぶかわ", km: 90.2, coords: [35.202511, 139.138411], city: "神奈川県小田原市", desc: "崖の上から太平洋を一望する完全無人駅。車窓を染める青い水平線が美しい。" },
            { id: "JT-19", name: "真鶴", rubi: "まなづる", km: 95.7, coords: [35.156111, 139.131921], city: "神奈川県足柄下郡真鶴町", desc: "原生林が美しい真鶴半島への入口。美味しい地魚料理や良質な小松石で有名。" },
            { id: "JT-20", name: "湯河原", rubi: "ゆがわら", km: 98.9, coords: [35.146211, 139.102211], city: "神奈川県足柄下郡湯河原町", desc: "古くは夏目漱石などの文豪が逗留し執筆に耽った、静寂あふれる名門温泉の温泉街。" },
            { id: "JT-21", name: "熱海", rubi: "あたみ", km: 104.6, coords: [35.103711, 139.078121], city: "静岡県熱海市", desc: "昭和の熱気と令和の最先端観光が見事に融合した、相模湾にそそり立つ大温泉都市。" }
        ];

        // 🌟 【CSVデータ完全反映】沿線スポットデータ
        var spotsData = [
            { id: "spot-1", name: "東京レンガ高架橋", cat: "その他", kmStart: 0.33, kmEnd: 3.13, shortDesc: "明治43年開業時の姿をほぼそのまま残す、日本最古の高架線。現存するレンガ造連続アーチ鉄道橋として最古のひとつ。", detailDesc: "", active: false },
            { id: "spot-2", name: "東海道新幹線と並走", cat: "その他", kmStart: 0.55, kmEnd: 5.52, shortDesc: "どちらも新橋付近までカーブの多い区間を走行する。並走したらラッキー。", detailDesc: "", active: false },
            { id: "spot-3", name: "有楽町駅", cat: "駅", kmStart: 0.77, kmEnd: 1.06, shortDesc: "山手線、京浜東北線、および東京メトロ有楽町線が通る。国内最初の高架下駅舎としても知られている。", detailDesc: "高架下には様々なお店が立ち並び、昔ながらの飲み屋街が広がっている。日比谷・銀座といった東京屈指の気品漂うエリアにも隣接する。", active: false },
            { id: "spot-4", name: "ゆりかもめと並走", cat: "その他", kmStart: 2.30, kmEnd: 2.96, shortDesc: "全線無人自動運転、お台場や有明などの臨海副都心（ウォーターフロント）へのアクセスに便利な、もはやアトラクションのような路線。", detailDesc: "", active: false },

        // 🌟 超高密度等間隔リサンプリング（全線滑らか化）
        var preciseTrack = [];
        (function generateSuperResolutionTrack() {
            for (var i = 0; i < trackPoints.length - 1; i++) {
                var p1 = trackPoints[i]; var p2 = trackPoints[i + 1];
                var dist = p2.km - p1.km;
                var subSteps = Math.max(30, Math.round(dist * 60)); // 1kmあたり約60点の等間隔
                for (var j = 0; j < subSteps; j++) {
                    var ratio = j / subSteps;
                    
                    // 方位角の計算
                    var dLng = (p2.lng - p1.lng) * Math.PI / 180;
                    var lat1Rad = p1.lat * Math.PI / 180;
                    var lat2Rad = p2.lat * Math.PI / 180;
                    var y = Math.sin(dLng) * Math.cos(lat2Rad);
                    var x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLng);
                    var bearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;

                    preciseTrack.push({
                        lat: p1.lat + (p2.lat - p1.lat) * ratio,
                        lng: p1.lng + (p2.lng - p1.lng) * ratio,
                        km: p1.km + (p2.km - p1.km) * ratio,
                        bearing: bearing
                    });
                }
            }
            preciseTrack.push(trackPoints[trackPoints.length - 1]);
        })();

        function projectOnSegment(pLat, pLng, lat1, lng1, lat2, lng2) {
            var x0 = pLng, y0 = pLat; var x1 = lng1, y1 = lat1; var x2 = lng2, y2 = lat2;
            var dx = x2 - x1; var dy = y2 - y1;
            if (dx === 0 && dy === 0) return { lat: lat1, lng: lng1, t: 0 };
            var t = ((x0 - x1) * dx + (y0 - y1) * dy) / (dx * dx + dy * dy);
            t = Math.max(0, Math.min(1, t));
            return { lat: y1 + t * dy, lng: x1 + t * dx, t: t };
        }

        function mapMatchToTrack(lat, lng) {
            var minDistance = Infinity; var matchedPt = null; var segmentIndex = 0; var segmentOffset = 0;
            for (var i = 0; i < preciseTrack.length - 1; i++) {
                var pt1 = preciseTrack[i]; var pt2 = preciseTrack[i + 1];
                var proj = projectOnSegment(lat, lng, pt1.lat, pt1.lng, pt2.lat, pt2.lng);
                var d = getDistance(lat, lng, proj.lat, proj.lng);
                if (d < minDistance) { minDistance = d; matchedPt = proj; segmentIndex = i; segmentOffset = proj.t; }
            }
            var pt1 = preciseTrack[segmentIndex]; var pt2 = preciseTrack[segmentIndex + 1];
            var interpolatedKm = pt1.km + (pt2.km - pt1.km) * segmentOffset;
            return { lat: matchedPt.lat, lng: matchedPt.lng, km: interpolatedKm, bearing: pt1.bearing };
        }

        function getCoordsByKm(km) {
            if (km <= 0) return preciseTrack[0];
            var lastIdx = preciseTrack.length - 1;
            if (km >= preciseTrack[lastIdx].km) return preciseTrack[lastIdx];
            for (var i = 0; i < lastIdx; i++) {
                var pt1 = preciseTrack[i]; var pt2 = preciseTrack[i + 1];
                if (km >= pt1.km && km <= pt2.km) {
                    var ratio = (km - pt1.km) / (pt2.km - pt1.km);
                    return {
                        lat: pt1.lat + (pt2.lat - pt1.lat) * ratio,
                        lng: pt1.lng + (pt2.lng - pt1.lng) * ratio,
                        bearing: pt1.bearing
                    };
                }
            }
            return preciseTrack[0];
        }

            watchId = navigator.geolocation.watchPosition(
                function(position) {
                    var lat = position.coords.latitude; var lng = position.coords.longitude;
                    var speedKmh = position.coords.speed ? position.coords.speed * 3.6 : null;
                    var matched = mapMatchToTrack(lat, lng);
                    updateAppStatus(matched.km, [matched.lat, matched.lng], matched.bearing, speedKmh);
                },
                function(error) { console.error(error); setMode("demo"); },
                { enableHighAccuracy: true, maximumAge: 200, timeout: 5000 }
            );
        }

        function stopGPSWatch() { if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; } }

        function toggleDemoPlay() {
            var btn = document.getElementById("btn-play-demo"); var icon = document.getElementById("icon-play-demo");
            if (isDemoPlaying) { stopDemo(); } else {
                isDemoPlaying = true; icon.className = "fa-solid fa-pause text-[9px] text-white";
                btn.className = "w-6 h-6 bg-railOrange rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all";
                demoPlayInterval = setInterval(function() {
                    var km = parseFloat(document.getElementById("demo-slider").value);
                    km += 0.035; if (km > 104.6) km = 0;
                    document.getElementById("demo-slider").value = km; onDemoSliderChange(km);
                }, 40); 
            }
        }

        function stopDemo() {
            isDemoPlaying = false; if (demoPlayInterval) { clearInterval(demoPlayInterval); demoPlayInterval = null; }
            var btn = document.getElementById("btn-play-demo"); var icon = document.getElementById("icon-play-demo");
            if (btn && icon) { icon.className = "fa-solid fa-play text-[9px] text-white"; btn.className = "w-6 h-6 bg-railBlue rounded-full flex items-center justify-center"; }
        }

        function onDemoSliderChange(value) {
            var km = parseFloat(value); document.getElementById("demo-km-label").innerText = `${km.toFixed(1)}km`;
            var state = getCoordsByKm(km); updateAppStatus(km, [state.lat, state.lng], state.bearing);
        }

        document.addEventListener("DOMContentLoaded", function() {
            initTimeline();
            
            // 地図ビュー (ドラッグを有効化)
            map = L.map('map', { 
                zoomControl: false, 
                attributionControl: false, 
                scrollWheelZoom: true, 
                dragging: true, 
                touchZoom: true 
            }).setView([35.6811, 139.7671], 14.5);
            
            map.userDragged = false;
            map.on('dragstart', function() {
                map.userDragged = true;
            });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

            // 軌道の描画
            L.polyline(preciseTrack.map(function(p) { return [p.lat, p.lng]; }), { color: '#2563eb', weight: 4.5, opacity: 0.9, lineJoin: 'round' }).addTo(map);

            var blueDotIcon = L.divIcon({
                html: `<div class="fix-rotate relative w-6 h-6 flex items-center justify-center"><div class="absolute w-5 h-5 bg-blue-500 rounded-full opacity-35 animate-ping"></div><div class="relative w-3.5 h-3.5 bg-blue-600 rounded-full border-2 border-white shadow-[0_0_8px_#3b82f6] z-10"></div></div>`,
                className: '', iconSize: [24, 24], iconAnchor: [12, 12]
            });
            trainMarker = L.marker([35.6811, 139.7671], { icon: blueDotIcon }).addTo(map);

            // 沿線固有のピン設定
            L.marker([35.2245, 139.1408], { icon: L.divIcon({ html: `<div class="fix-rotate w-6 h-6 rounded-full bg-blue-600/20 border border-blue-400 flex items-center justify-center text-blue-400 shadow-md"><i class="fa-solid fa-camera text-[10px]"></i></div>`, className: '', iconSize: [24, 24], iconAnchor: [12, 12] }) }).addTo(map);
            L.marker([35.2155, 139.1378], { icon: L.divIcon({ html: `<div class="fix-rotate w-6 h-6 rounded-full bg-amber-600/20 border border-amber-500 flex items-center justify-center text-amber-500 shadow-md"><i class="fa-solid fa-monument text-[9px]"></i></div>`, className: '', iconSize: [24, 24], iconAnchor: [12, 12] }) }).addTo(map);

            setMode("demo");
        });
    </script>
</body>
</html>
