<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>沿線案内 スマートフォン全画面アプリ (GPS/デモハイブリッド)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Montserrat:wght@500;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 路線データ（路線を足すときはこの行を増やす） -->
    <script src="line-tokaido.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans JP', 'sans-serif'],
                        mono: ['Montserrat', 'sans-serif'],
                        roboto: ['Roboto Mono', 'monospace'], // JTアイコン用の旧等幅フォント
                    },
                    colors: {
                        appDark: '#000000',
                        appCard: '#121826', /* より明瞭な色彩のためにカード背景を少し明るく調整 */
                        appBorder: '#23304a', /* ボーダー線をくっきり見せるように調整 */
                        railBlue: '#2563eb',
                        railOrange: '#ff8c00',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #000000;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            transition: background-color 0.25s ease;
            /* iOSセーフエリア対策 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        /* スクロールバー非表示 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* カード短文の簡易表示（2行でクランプ。続きは「詳細」で全文） */
        .clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* 地図の周辺影効果 */
        .map-shadow {
            box-shadow: inset 0 0 20px rgba(0,0,0,0.85);
            pointer-events: none;
            z-index: 1000;
        }

        /* 進行方向を上にするための回転は #map-rotator（Leaflet外の素のラッパー）にかける。
           Leaflet本体(#map)には transform を当てない＝内部描画/ドラッグと干渉しない。
           表示枠より各辺220px大きく確保し、回転しても四隅にタイル未描画 of 黒三角が出ないようにする。 */
        #map-rotator {
            position: absolute;
            top: -220px;
            left: -220px;
            width: calc(100% + 440px);
            height: calc(100% + 440px);
            transform-origin: center center;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* アイコンが地図と一緒に回転して傾くのを防ぐための補正 */
        .rotated-map .leaflet-marker-icon .fix-rotate {
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-origin: center;
        }


        /* 💡 駅タイムラインの現在地アイコン：駅間走行中のみ動く（停車中は静止）。
           上→下へ動いたら、次のループで瞬時に上へ戻る（往復させない）。
           軸への中央寄せ(translateX(-50%))をキーフレーム内に含める。
           含めないと translateY が打ち消し合い、動くたびに横へずれて線から外れる。
           イージングは cubic-bezier(0.65,0,0.35,1)＝始まりと終わりは普通の速さ、中間だけ速く動く */
        @keyframes pulse-arrow {
            0%   { transform: translateX(-50%) translateY(0); }
            100% { transform: translateX(-50%) translateY(4px); }
        }
        .current-location-pulse {
            animation: pulse-arrow 1.3s infinite cubic-bezier(0.65, 0, 0.35, 1);
            left: 12px;
        }

        /* 💡 追従解除時の控えめな点滅アニメーション */
        @keyframes pulse-soft {
            0%, 100% { opacity: 0.25; }
            50%      { opacity: 0.95; }
        }
        .animate-pulse-soft {
            animation: pulse-soft 2.0s infinite ease-in-out;
        }
    </style>
</head>
<body class="w-full h-[100dvh] bg-appDark text-slate-100 flex flex-col justify-between overflow-hidden">

    <!-- 💡 東海道線オレンジライン (最上部固定) -->
    <div class="w-full h-[5px] bg-railOrange shrink-0"></div>

    <!-- 1. 最上部ヘッダー部 -->
    <div class="bg-appDark pt-1 px-4 pb-1 z-20 shrink-0 select-none">
        
        <!-- 1.1 路線名、GPS/デモ切り替えスイッチ -->
        <div class="flex items-center justify-between mb-0.5">
            <div class="flex items-center gap-1.5">
                <!-- JTアイコン: 比率はそのままに縮小 -->
                <div class="w-[16px] h-[16px] bg-white border-[2px] border-orange-500 rounded flex items-center justify-center shadow-sm shrink-0">
                    <span class="text-appDark font-black text-[8px] font-roboto tracking-tighter leading-none">JT</span>
                </div>
                <h1 class="text-[11px] font-black tracking-wide text-white">東海道線（JR東日本）</h1>
            </div>
            
            <!-- GPS/デモスイッチ -->
            <div class="flex items-center gap-1.5">
                <div class="flex bg-slate-900 border border-slate-700 p-0.5 rounded-lg text-[9px]">
                    <button id="toggle-gps" onclick="setMode('gps')" class="px-2.5 py-0.5 rounded font-bold transition-all text-slate-400">
                        GPS
                    </button>
                    <button id="toggle-demo" onclick="setMode('demo')" class="px-2.5 py-0.5 rounded font-bold transition-all bg-railBlue text-white shadow">
                        デモ
                    </button>
                </div>
            </div>
        </div>

        <!-- 1.2 全体距離・進捗プログレスバー -->
        <div class="relative w-full h-1 bg-slate-800 rounded-full mb-1 mt-1">
            <div id="ui-main-progress" class="absolute h-full bg-railBlue rounded-full" style="width: 0%;"></div>
            <div id="ui-progress-dot" class="absolute w-2.5 h-2.5 bg-white rounded-full top-1/2 -translate-y-1/2 shadow-[0_0_6px_#fff]" style="left: 0%;"></div>
            <span id="ui-distance-label" class="absolute right-0 -top-4 text-[9px] text-blue-400 font-mono font-bold">0.0km</span>
            <div id="km-major-labels" class="absolute w-full top-1.5 px-0.5 text-[8px] text-slate-500 font-medium whitespace-nowrap" style="height: 10px;">
                <span id="km-major-0" data-km="0" class="font-bold whitespace-nowrap">東京</span>
                <span id="km-major-1" data-km="28.8" class="whitespace-nowrap">横浜</span>
                <span id="km-major-2" data-km="51.1" class="whitespace-nowrap">藤沢</span>
                <span id="km-major-3" data-km="63.5" class="whitespace-nowrap">平塚</span>
                <span id="km-major-4" data-km="83.8" class="whitespace-nowrap">小田原</span>
                <span id="km-major-5" data-km="104.6" class="whitespace-nowrap">熱海</span>
            </div>
        </div>

        <!-- 1.3 駅切り替え表示部 (前駅左寄せ・次駅右寄せの使いやすい左右スプリット配置) -->
        <div id="ui-station-header-container" class="relative pt-2 pb-1 min-h-[64px] flex items-center w-full">
            <!-- デフォルト状態: 駅間走行表示（左右寄せ配置） -->
            <div id="header-running-view" class="flex justify-between items-center w-full">
                <!-- 左：前駅 (左寄せ左揃え) -->
                <div class="flex flex-col items-start w-[45%]">
                    <span id="ui-prev-rubi" class="text-[8px] text-slate-400 font-medium tracking-wider text-left">とうきょう</span>
                    <h2 id="ui-prev-name" class="text-lg font-black text-white tracking-tight text-left truncate w-full">東京</h2>
                    <span id="ui-prev-id" class="text-[9px] text-slate-500 font-mono font-bold text-left">JT-01</span>
                </div>
                <!-- 中央：矢印 (中央配置) -->
                <div class="text-railBlue px-2">
                    <i class="fa-solid fa-chevron-right text-sm animate-pulse"></i>
                </div>
                <!-- 右：次駅 (右寄せ右揃え) -->
                <div class="flex flex-col items-end w-[45%]">
                    <span id="ui-next-rubi" class="text-[8px] text-slate-400 font-medium tracking-wider text-right">しんばし</span>
                    <h2 id="ui-next-name" class="text-lg font-black text-white tracking-tight text-right truncate w-full">新橋</h2>
                    <span id="ui-next-id" class="text-[9px] text-slate-500 font-mono font-bold text-right">JT-02</span>
                </div>
            </div>

            <!-- 到着時状態: 1駅特化＋駅紹介。長文は「▼詳細」で下にドロップダウン展開して見やすく -->
            <div id="header-stopped-view" class="hidden justify-between items-center w-full gap-2">
                <!-- 左：現在停車中の駅名 -->
                <div class="flex flex-col items-start w-[33%] shrink-0 pr-1">
                    <span id="ui-current-rubi" class="text-[8px] text-slate-400 font-medium tracking-wider text-left">とうきょう</span>
                    <h2 id="ui-current-name" class="text-xl font-black text-white tracking-tight text-left truncate w-full leading-tight">東京</h2>
                    <span id="ui-current-id" class="text-[9px] text-slate-500 font-mono font-bold text-left">JT-01</span>
                </div>
                <!-- 右：駅紹介カード（2行で省略記号「…」まで表示。「詳細」はシンプルな文字のみ） -->
                <div id="station-intro-compact" class="flex-grow relative">
                    <div class="bg-slate-900 border border-blue-500/35 rounded-lg overflow-hidden relative h-[38px] flex items-center">
                        <p id="ui-station-intro" class="text-[10px] text-slate-100 leading-snug font-medium px-2.5 pr-8 clamp-2">日本の起点となる赤レンガ造りの歴史的ターミナル駅。</p>
                        <button id="station-intro-toggle" onclick="toggleStationIntro()" class="hidden absolute bottom-1 right-1.5 text-[8px] font-bold text-blue-300 flex items-center gap-0.5">
                            <i class="fa-solid fa-caret-down" id="station-intro-caret"></i><span id="station-intro-label">詳細</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 1.4 3連ステータスカード (1行目にタイトル、2行目に内容の配置) -->
        <div class="grid grid-cols-12 gap-1.5 mt-1">
            <!-- 現在地カード -->
            <div class="col-span-6 bg-appCard border border-appBorder rounded-lg px-1.5 py-0.5 flex flex-col justify-center items-center text-center h-[30px]">
                <span class="text-[7.5px] text-slate-400 font-medium flex items-center gap-0.5 leading-none"><i class="fa-solid fa-location-dot text-slate-500"></i>現在地</span>
                <div id="ui-city-name" class="text-[9px] font-black text-slate-100 whitespace-nowrap overflow-hidden text-ellipsis w-full mt-0.5 leading-none">東京都千代田区</div>
            </div>
            <!-- 速度カード (フォントをNotoSansのままにし、単位を正確なkm/hに変更) -->
            <div class="col-span-3 bg-appCard border border-appBorder rounded-lg px-1.5 py-0.5 flex flex-col justify-center items-center text-center h-[30px]">
                <span class="text-[7.5px] text-slate-400 font-medium flex items-center gap-0.5 leading-none"><i class="fa-solid fa-gauge-high text-slate-500"></i>速度</span>
                <div class="text-[9px] font-sans font-black text-slate-100 mt-0.5 leading-none"><span id="ui-speed">0</span><span class="text-[7.5px] font-sans font-normal text-slate-400 ml-0.5">km/h</span></div>
            </div>
            <!-- GPSカード -->
            <div class="col-span-3 bg-appCard border border-appBorder rounded-lg px-1.5 py-0.5 flex flex-col justify-center items-center text-center h-[30px]">
                <span class="text-[7.5px] text-slate-400 font-medium flex items-center gap-0.5 leading-none"><i class="fa-solid fa-satellite-dish text-slate-500"></i>GPS</span>
                <div id="ui-gps-badge" class="text-[8px] font-bold text-blue-400 bg-blue-500/5 border border-blue-500/10 px-1 rounded w-full mt-0.5 text-center leading-none">デモ</div>
            </div>
        </div>

    </div>

    <!-- 2. 地図ビュー (デモ操作フローティング + 手動操作対応) -->
    <div id="map-section" class="relative h-[170px] w-full z-10 border-y border-appBorder overflow-hidden shrink-0">
        <!-- 回転は専用ラッパー(#map-rotator)にかける。Leaflet本体(#map)には transform を当てないことで内部描画と干渉させない -->
        <div id="map-rotator">
            <div id="map" class="w-full h-full bg-slate-950 rotated-map"></div>
        </div>
        <div class="map-shadow absolute inset-0"></div>
        
        <!-- フローティングデモコントローラー -->
        <div id="demo-ctrl-bar" class="absolute top-2 left-2 right-2 z-[1000] bg-slate-900 backdrop-blur-md border border-slate-800 rounded-xl p-1.5 flex items-center justify-between gap-2.5 shadow-lg">
            <div class="flex items-center gap-1.5 shrink-0">
                <button id="btn-play-demo" onclick="toggleDemoPlay()" class="w-6 h-6 bg-railBlue rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all">
                    <i id="icon-play-demo" class="fa-solid fa-play text-[9px] text-white"></i>
                </button>
                <span class="text-[9px] text-slate-400 font-bold" id="demo-status-label">デモ 6x</span>
            </div>
            <input type="range" id="demo-slider" min="0" max="104.6" step="0.1" value="0" oninput="onDemoSliderChange(this.value)" class="flex-grow accent-railBlue bg-slate-800 rounded-lg appearance-none h-1 cursor-pointer">
            <span class="text-[9px] text-blue-400 font-mono font-bold shrink-0" id="demo-km-label">0.0km</span>
        </div>

        <!-- 進行方向インジケータ兼「現在地追従復帰ボタン」 (右下のナビ矢印マークが常に真上を指すように、アイコン自体の向きを補正) -->
        <button id="compass-indicator" onclick="resetMapTracking()" class="absolute bottom-2 right-2 z-[1000] bg-slate-900 border border-slate-700 hover:border-white w-8 h-8 rounded-lg flex items-center justify-center text-white shadow-md transition-all active:scale-90" title="現在地に戻す">
            <span id="compass-icon-wrapper" class="transform -rotate-45" style="display: inline-block;">
                <i class="fa-solid fa-location-arrow text-xs"></i>
            </span>
            <!-- 💡 animate-pingを廃止し、ゆっくり点滅するだけの控えめな警告枠に変更 -->
            <span id="tracking-warning-pulse" class="absolute inset-0 rounded-lg border border-white opacity-0"></span>
        </button>
    </div>

    <!-- 駅紹介の全画面パネル（駅到着時「駅紹介を見る」で開く。開いている間は地図(#map-section)を隠し、この場所に表示） -->
    <div id="station-intro-overlay" class="hidden w-full h-[170px] bg-appDark z-10 shrink-0 px-4 py-2 flex flex-col">
        <div class="bg-appCard border border-appBorder rounded-xl px-3 py-2.5 flex flex-col flex-grow min-h-0 shadow-md shadow-slate-950/40">
            <div class="flex items-center justify-between mb-1.5 shrink-0">
                <span class="text-[10px] font-bold text-blue-300 flex items-center gap-1.5"><i class="fa-solid fa-circle-info"></i> 駅紹介</span>
                <button onclick="toggleStationIntro()" class="text-[8px] font-bold text-blue-300 flex items-center gap-0.5"><i class="fa-solid fa-caret-up"></i> 閉じる</button>
            </div>
            <p id="ui-station-intro-full" class="text-[11px] text-slate-100 leading-relaxed font-medium overflow-y-auto no-scrollbar flex-grow min-h-0"></p>
        </div>
    </div>

    <!-- 3. 下部エリア -->
    <div class="flex-grow flex flex-col overflow-hidden bg-gradient-to-b from-appDark to-[#05080e] pb-1.5 space-y-2">
        
        <!-- 沿線スポットセクション (横スクロール。上部パディング py-2 を適用して scale 時の角丸見切れを完全解消) -->
        <div class="shrink-0 pt-1">
            <div id="scenic-card-container" class="flex gap-2.5 overflow-x-auto px-4 py-2 no-scrollbar snap-x scroll-smooth">
                <!-- カードは SPOTS 配列から renderSpotCards() で自動生成 -->
            </div>
            <!-- 💡 詳細を一括でしまえる一括格納バー -->
            <div id="collapse-all-bar" class="hidden justify-center items-center py-1 cursor-pointer transition-all border-b border-appBorder" onclick="collapseAllScenicCards()">
                <div class="flex items-center gap-1.5 text-[9px] text-slate-400 font-bold">
                    <span class="w-12 h-[1px] bg-slate-800"></span>
                    <i class="fa-solid fa-caret-up text-[11px] text-slate-400"></i>
                    <span>すべて折りたたむ</span>
                    <span class="w-12 h-[1px] bg-slate-800"></span>
                </div>
            </div>
        </div>

        <!-- 4. 停車駅タイムライン -->
        <div class="flex-grow flex flex-col min-h-0 px-4">
            <!-- タイムラインコンテナ -->
            <div class="flex-grow overflow-y-auto pr-1 relative no-scrollbar" id="station-timeline-container">
                <div class="relative py-1" id="station-timeline">
                    
                    <!-- 縦線ライン -->
                    <div class="absolute left-[11.25px] top-0 bottom-0 w-[1.5px] bg-slate-400 z-0"></div>

                    <!-- 21駅リストコンテナ -->
                    <div id="timeline-stations" class="space-y-1.5"></div>

                </div>
            </div>
        </div>

    </div>

    <!-- 通知モーダル/トースト -->
    <div id="app-toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-slate-900 border border-slate-700 text-white text-xs px-4 py-2.5 rounded-xl shadow-2xl z-[9999] opacity-0 pointer-events-none transition-all duration-300 flex items-center gap-2">
        <i class="fa-solid fa-circle-info text-blue-400" id="toast-icon"></i>
        <span id="toast-message">メッセージ</span>
    </div>

    <!-- データベース・ロジック -->
    <script>
        // 東海道本線（東京〜熱海）全21駅の座標定義 ＆ 各駅紹介データ
                // 💡 路線データは line-*.js（window.LINES）から読み込む。CATEGORIES は全路線共通の設定。
        var LINE_REGISTRY = window.LINES || {};
        var currentLine = LINE_REGISTRY.tokaido || Object.values(LINE_REGISTRY)[0] || null;
        if (!currentLine) {
            document.addEventListener('DOMContentLoaded', function () {
                document.body.innerHTML = '<div style="color:#e8eef8;font-family:sans-serif;padding:24px;line-height:1.7">路線データ（line-tokaido.js）が読み込めませんでした。<br>HTMLと同じ場所に line-tokaido.js を置いてください。</div>';
            });
        }
        var stations = currentLine ? currentLine.stations : [];
        var trackPoints = currentLine ? currentLine.trackPoints : [];
        var SPOTS = currentLine ? currentLine.spots : [];
        // 路線の総距離（営業キロ）。104.6 などの直書きをやめ、駅データの末尾から導出する
        var TOTAL_KM = stations.length ? stations[stations.length - 1].km : 0;

        // 高精度線形 (全線補間用)

        // 💡 沿線スポット定義（カテゴリ→アイコン/色、スポット本体）
        var CATEGORIES = {
            "建造物": { icon: "fa-bridge-water", color: "#818cf8" },
            "景観":   { icon: "fa-camera",       color: "#60a5fa" },
            "歴史":   { icon: "fa-landmark",     color: "#f59e0b" },
            "自然":   { icon: "fa-leaf",         color: "#34d399" },
            "駅":     { icon: "fa-train-subway", color: "#fb7185" }, // 駅舎アイコン
            "その他": { icon: "fa-circle-info",  color: "#facc15" }  // 情報マークアイコン
        };


        var SPOT_IDS = []; // renderSpotCards() が採番

        // 💡 グローバル変数
        var map;
        var trainMarker;
        var spotMarkers = [];
        var stationMarkers = [];
        // 上部キロ程メーターの主要駅ラベル（id・km）。現在地に最も近いものだけ強調表示する
        var KM_MAJOR_LABELS = [
            { id: "km-major-0", km: 0 },
            { id: "km-major-1", km: 28.8 },
            { id: "km-major-2", km: 51.1 },
            { id: "km-major-3", km: 63.5 },
            { id: "km-major-4", km: 83.8 },
            { id: "km-major-5", km: 104.6 }
        ];
        var MAP_TILE_URL = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
        var currentMode = "demo";
        var currentKm = 0.0;
        var demoPlayInterval = null;
        var isDemoPlaying = false;
        var watchId = null;
        var isMapUserInteracting = false; // ユーザーが地図を手動操作しているフラグ
        var GPS_OFFLINE_THRESHOLD_M = 2000; // この距離(m)以上 線路から離れたら「沿線外」とみなし地図を飛ばさない
        var gpsOfflineNotified = false;     // 沿線外トーストの多重表示防止

        // トースト通知システム
        function showToast(message, type = "info") {

        // タイムライン構築
        function spotKmLabel(s) {

        // 💡 SPOTS 配列からカードを自動生成 (km部分に Montserrat フォント 'font-mono' を適用)

                            <p class="text-[9px] text-slate-300 mt-0.5 leading-normal clamp-2" id="desc-${id}-short">${s.short || ""}</p>
                            <p class="text-[9px] text-slate-300 mt-0.5 leading-normal hidden" id="desc-${id}-detail">${fullText}</p>
                        </div>
                        <button id="btn-${id}" onclick="toggleCardDetails('${id}')" class="hidden mt-2 text-left text-[8px] font-bold flex items-center gap-1 text-white" data-has-detail="${hasDetail ? '1' : '0'}">

            // 💡 「詳細」は、実際に本文が2行に収まりきらず省略されている場合、
            //    または detail欄に文章が登録されている場合だけ表示する（＝押しても何も起きないことがない）

        // 💡 SPOTS 配列から地図ピンを自動生成（カテゴリ別アイコン・色）
        function renderSpotMarkers() {
            if (!map) return;
            spotMarkers.forEach(function(m) { map.removeLayer(m); });
            spotMarkers = [];
            SPOTS.forEach(function(s) {
                if (s.show === false) return;
                var cat = CATEGORIES[s.cat] || { color: "#94a3b8" };

                // 💡 地図上はすべてのカテゴリでアイコンを出さず、小さい塗りつぶし丸のみで統一（その他は白、他はカテゴリ色）
                var dotColor = isOther ? "#ffffff" : cat.color;
                var iconHtml = `<div class="fix-rotate rounded-full shadow-md" style="width:8px;height:8px;background:${dotColor};border:1px solid #000000"></div>`;

                });

                m.bindTooltip(s.name, { direction: 'top', offset: [0, -8] });

        }

        // 💡 路線の停車駅（駅タイムラインに記載の全駅）を、地図上にシンプルな青丸＋青字の駅名で常時表示
        function renderStationMarkers() {
            if (!map) return;
            stationMarkers.forEach(function(m) { map.removeLayer(m); });
            stationMarkers = [];
            var lineColor = (currentLine && currentLine.color) || '#2563eb';
            stations.forEach(function(st) {
                var icon = L.divIcon({
                    html: `<div class="fix-rotate flex items-center gap-1" style="white-space:nowrap">
                             <span class="block rounded-full shadow-md" style="width:11px;height:11px;background:${lineColor};border:1.5px solid #000000"></span>
                             <span class="font-bold" style="font-size:9.5px;color:${lineColor};text-shadow:0 0 3px rgba(0,0,0,0.9),0 0 6px rgba(0,0,0,0.7),0 1px 2px rgba(0,0,0,0.8)">${st.name}</span>
                           </div>`,
                    className: '',
                    iconSize: [130, 12],
                    iconAnchor: [5.5, 5.5]
                });

                stationMarkers.push(m);

        }

        function initTimeline() {
            var container = el.timelineStations;
            var html = "";

            stations.forEach(function(station, index) {
                // 💡 駅名表示：すべての駅をはっきり見せるため、不透明度を常に100% (opacity-100) に固定
                html += `
                    <div id="station-${station.id}" class="station-row relative flex items-center justify-between h-4 opacity-100 transition-all duration-300">
                        <!-- left-[12px] で縦線軸と絶対同調。現在地ドットとピッタリ重ねます -->
                        <div class="absolute left-[12px] -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-slate-400 z-10 border border-appDark"></div>
                        <span class="station-name text-slate-200 font-bold text-xs pl-8">${station.name}</span>
                        <span class="font-mono text-[9px] text-slate-400">${station.km.toFixed(1)}km</span>
                    </div>
                `;
                
                // 駅間ナビ矢印（駅間走行中のみ表示。アニメーションは current-location-pulse が担う）
                if (index < stations.length - 1) {
                    var nextStation = stations[index + 1];
                    html += `
                        <div id="section-${station.id}-${nextStation.id}" class="section-row relative hidden items-center h-4 my-0.5 transition-all duration-300">
                            <!-- 縦線軸（left-[12px]）と同調。translate-x-1/2 は current-location-pulse 側のキーフレームが担うため外す -->
                            <div class="absolute w-4 h-4 flex items-center justify-center z-10 current-location-pulse">
                                <svg width="14" height="14" viewBox="0 0 24 24" style="display:block"><path d="M12 22 L4 5 L12 12 L20 5 Z" fill="#60a5fa"/></svg>
                            </div>
                        </div>
                    `;
                }
            });
            container.innerHTML = html;
        }

        // ハバーサイン距離算出
        function getDistance(lat1, lon1, lat2, lon2) {
            var R = 6371e3;
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // 💡 実際の現在地の市区町村を取得
        function updateCityFromCoords(lat, lng) {
            if (typeof fetch !== "function") return;
            if (!isFinite(lat) || !isFinite(lng)) return;
            var now = Date.now();
            if (geocodeLatLng) {
                var moved = getDistance(lat, lng, geocodeLatLng[0], geocodeLatLng[1]);
                if (moved < 250 && (now - geocodeAt) < 8000) return;
            }
            if (geocodePending && (now - geocodeAt) < 8000) return;
            geocodePending = true;
            geocodeAt = now;
            geocodeLatLng = [lat, lng];

            var url = "https://nominatim.openstreetmap.org/reverse?format=jsonv2&zoom=10&accept-language=ja"
                    + "&lat=" + encodeURIComponent(lat) + "&lon=" + encodeURIComponent(lng);

            fetch(url, { headers: { "Accept": "application/json" } })
                .then(function(res) { return res.ok ? res.json() : null; })
                .then(function(data) {
                    geocodePending = false;
                    var a = data && data.address;
                    if (!a) return;
                    var pref = a.province || a.state || a.region || "";
                    var muni = a.city || a.town || a.city_district || a.county
                             || a.municipality || a.village || a.suburb || a.ward || "";
                    var label = ("" + pref + muni).trim();
                    if (label) {
                        geocodedCity = label;
                        var el = el.uiCityName;
                        if (el) el.innerText = label;
                    }
                })
                .catch(function() { geocodePending = false; });
        }

        // ベクトル投影（点を線分に投影）
        function projectOnSegment(pLat, pLng, lat1, lng1, lat2, lng2) {
            var x0 = pLng, y0 = pLat;
            var x1 = lng1, y1 = lat1;
            var x2 = lng2, y2 = lat2;
            var dx = x2 - x1;
            var dy = y2 - y1;
            if (dx === 0 && dy === 0) return { lat: lat1, lng: lng1, t: 0 };
            var t = ((x0 - x1) * dx + (y0 - y1) * dy) / (dx * dx + dy * dy);
            t = Math.max(0, Math.min(1, t));
            return { lat: y1 + t * dy, lng: x1 + t * dx, t: t };
        }

        // GPSマップマッチング
        function mapMatchToTrack(lat, lng) {
            var minDistance = Infinity;
            var matchedPt = null;
            var segmentIndex = 0;
            var segmentOffset = 0;

            for (var i = 0; i < trackPoints.length - 1; i++) {
                var pt1 = trackPoints[i];
                var pt2 = trackPoints[i + 1];
                var proj = projectOnSegment(lat, lng, pt1.lat, pt1.lng, pt2.lat, pt2.lng);
                var d = getDistance(lat, lng, proj.lat, proj.lng);
                
                if (d < minDistance) {
                    minDistance = d;
                    matchedPt = proj;
                    segmentIndex = i;
                    segmentOffset = proj.t;
                }
            }

            var pt1 = trackPoints[segmentIndex];
            var pt2 = trackPoints[segmentIndex + 1];
            var interpolatedKm = pt1.km + (pt2.km - pt1.km) * segmentOffset;
            
            var dLng = (pt2.lng - pt1.lng) * Math.PI / 180;
            var lat1Rad = pt1.lat * Math.PI / 180;
            var lat2Rad = pt2.lat * Math.PI / 180;
            var y = Math.sin(dLng) * Math.cos(lat2Rad);
            var x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLng);
            var bearing = Math.atan2(y, x) * 180 / Math.PI;

            return {
                lat: matchedPt.lat,
                lng: matchedPt.lng,
                km: interpolatedKm,
                bearing: (bearing + 360) % 360,
                distance: minDistance
            };
        }

        // デモ用キロ程補間
        function getCoordsByKm(km) {
            if (km <= 0) return { lat: trackPoints[0].lat, lng: trackPoints[0].lng, bearing: 180 };
            var lastIdx = trackPoints.length - 1;
            if (km >= trackPoints[lastIdx].km) return { lat: trackPoints[lastIdx].lat, lng: trackPoints[lastIdx].lng, bearing: 180 };

            for (var i = 0; i < lastIdx; i++) {
                var pt1 = trackPoints[i];
                var pt2 = trackPoints[i + 1];
                if (km >= pt1.km && km <= pt2.km) {
                    var ratio = (km - pt1.km) / (pt2.km - pt1.km);
                    var lat = pt1.lat + (pt2.lat - pt1.lat) * ratio;
                    var lng = pt1.lng + (pt2.lng - pt1.lng) * ratio;

                    var dLng = (pt2.lng - pt1.lng) * Math.PI / 180;
                    var lat1Rad = pt1.lat * Math.PI / 180;
                    var lat2Rad = pt2.lat * Math.PI / 180;
                    var y = Math.sin(dLng) * Math.cos(lat2Rad);
                    var x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLng);
                    var bearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;

                    return { lat: lat, lng: lng, bearing: bearing };
                }
            }
            return { lat: trackPoints[0].lat, lng: trackPoints[0].lng, bearing: 180 };
        }

        // 💡 UI・位置・地図の同期
        // 駅紹介の全画面パネルを開閉（開いている間は地図と、駅名横の簡易表示を両方隠す。閉じる操作は下のパネル側にのみ表示）
        function toggleStationIntro() {
            var overlay = el.stationIntroOverlay;
            if (!overlay) return;
            var willOpen = overlay.classList.contains("hidden");
            if (willOpen) {
                if (el.stationIntroFull && el.uiStationIntro) el.stationIntroFull.textContent = el.uiStationIntro.textContent;
                overlay.classList.remove("hidden");
                if (el.mapSection) el.mapSection.classList.add("hidden");
                if (el.stationIntroCompact) el.stationIntroCompact.classList.add("hidden");
            } else {
                closeStationIntroOverlay();
            }
        }
        function closeStationIntroOverlay() {
            if (el.stationIntroOverlay) el.stationIntroOverlay.classList.add("hidden");
            if (el.mapSection) el.mapSection.classList.remove("hidden");
            if (el.stationIntroCompact) el.stationIntroCompact.classList.remove("hidden");
            if (el.stationIntroCaret) el.stationIntroCaret.className = "fa-solid fa-caret-down";
            if (el.stationIntroLabel) el.stationIntroLabel.innerText = "詳細";
            // 地図を隠していた間サイズ計算がずれている可能性があるため再計測
            if (map) setTimeout(function() { map.invalidateSize(); }, 50);
        }

        // ───────────────────────────────────────────────────────────
        //  画面更新：updateAppStatus は「司令塔」。実際の更新は役割ごとの関数に分割。
        //  呼び出し順 = 進捗 → 区間判定 → ヘッダー → 市区 → 速度 → 地図 → スポット → タイムライン
        // ───────────────────────────────────────────────────────────
        function updateAppStatus(km, coords, bearing, speed = null) {
            currentKm = km;
            var seg = findCurrentSegment(km);     // 今いる区間 {prev, next, stopped}
            updateProgressBar(km);
            updateHeaderInfo(km, seg);
            updateCityLabel(km, coords, seg);
            updateSpeedo(km, speed);
            updateMapView(coords, bearing, speed);
            updateSpotHighlights(km);
            updateStationTimeline(km, seg);
        }

        // 今いる区間（直前駅 prev / 次駅 next）と、停車中の駅 stopped を求める
        function findCurrentSegment(km) {
            var prev = stations[0];
            var next = stations[stations.length - 1];
            for (var i = 0; i < stations.length - 1; i++) {
                if (km >= stations[i].km && km <= stations[i + 1].km) {
                    prev = stations[i];
                    next = stations[i + 1];
                    break;
                }
            }
            var stopped = null;
            for (var j = 0; j < stations.length; j++) {
                if (Math.abs(km - stations[j].km) < 0.15) { stopped = stations[j]; break; }
            }
            return { prev: prev, next: next, stopped: stopped };
        }

        // 進捗バー・距離ラベル
        // 💡 主要駅ラベルを、見た目の均等配置ではなく「実際のキロ程に比例した位置」に配置する。
        //    これにより、駅到着時にスライダー(現在地ドット)の位置とラベルの文字位置がズレない。
        function positionKmMajorLabels() {
            if (!TOTAL_KM) return;
            for (var i = 0; i < KM_MAJOR_LABELS.length; i++) {
                var lbl = document.getElementById(KM_MAJOR_LABELS[i].id);
                if (!lbl) continue;
                var pct = (KM_MAJOR_LABELS[i].km / TOTAL_KM) * 100;
                lbl.style.position = "absolute";
                lbl.style.left = pct + "%";
                // 端(東京=左端／熱海=右端)は画面外に飛び出さないよう、はみ出す方向にだけずらす
                if (i === 0) lbl.style.transform = "translateX(0)";
                else if (i === KM_MAJOR_LABELS.length - 1) lbl.style.transform = "translateX(-100%)";
                else lbl.style.transform = "translateX(-50%)";
            }
        }

        function updateProgressBar(km) {
            var progressPercent = TOTAL_KM ? (km / TOTAL_KM) * 100 : 0;
            var uiMainProgress = el.uiMainProgress;
            var uiProgressDot = el.uiProgressDot;
            var uiDistanceLabel = el.uiDistanceLabel;
            if (uiMainProgress) uiMainProgress.style.width = `${progressPercent}%`;
            if (uiProgressDot) uiProgressDot.style.left = `${progressPercent}%`;
            if (uiDistanceLabel) uiDistanceLabel.innerText = `${km.toFixed(1)}km`;

            // 💡 主要駅ラベル（東京・横浜…）は現在地に最も近い駅だけ強調する（駅到着時にズレないよう実測kmで判定）
            var nearestIdx = 0, nearestDiff = Infinity;
            for (var j = 0; j < KM_MAJOR_LABELS.length; j++) {
                var diff = Math.abs(km - KM_MAJOR_LABELS[j].km);
                if (diff < nearestDiff) { nearestDiff = diff; nearestIdx = j; }
            }
            for (var k = 0; k < KM_MAJOR_LABELS.length; k++) {
                var lbl = document.getElementById(KM_MAJOR_LABELS[k].id);
                if (!lbl) continue;
                lbl.className = "whitespace-nowrap" + ((k === nearestIdx) ? " text-blue-500 font-bold" : "");
            }
        }

        // ヘッダー（停車中／駅間走行中の表示切替とテキスト書き換え）
        function updateHeaderInfo(km, seg) {
            var runningView = el.headerRunningView;
            var stoppedView = el.headerStoppedView;

            if (seg.stopped) {
                if (runningView) runningView.classList.add("hidden");
                if (stoppedView) { stoppedView.classList.remove("hidden"); stoppedView.classList.add("flex"); }

                var uiCurId = el.uiCurrentId;
                var uiCurRubi = el.uiCurrentRubi;
                var uiCurName = el.uiCurrentName;
                var uiIntro = el.uiStationIntro;
                if (uiCurId) uiCurId.innerText = seg.stopped.id;
                if (uiCurRubi) uiCurRubi.innerText = seg.stopped.rubi;
                if (uiCurName) uiCurName.innerText = seg.stopped.name;
                if (uiIntro) uiIntro.innerText = seg.stopped.intro;

                // 駅が変わったら開いていたドロップダウンは閉じる
                if (stationIntroFor !== seg.stopped.id) {
                    stationIntroFor = seg.stopped.id;
                    closeStationIntroOverlay();
                }
                // 長文（3行に収まらない）のときだけ「▼詳細」を出す
                // 長さの推測ではなく、実際に2行からあふれているかを描画後に測定して判定
                if (el.stationIntroToggle) {
                    requestAnimationFrame(function() {
                        var p = el.uiStationIntro;
                        if (p) el.stationIntroToggle.classList.toggle("hidden", p.scrollHeight <= p.clientHeight + 1);
                    });
                }
            } else {
                if (stoppedView) stoppedView.classList.add("hidden");
                if (runningView) { runningView.classList.remove("hidden"); runningView.classList.add("flex"); }

                // 走行中はドロップダウンと▼詳細を隠す
                stationIntroFor = null;
                closeStationIntroOverlay();
                if (el.stationIntroToggle) el.stationIntroToggle.classList.add("hidden");

                var uiPrevRubi = el.uiPrevRubi;
                var uiPrevName = el.uiPrevName;
                var uiPrevId = el.uiPrevId;
                var uiNextRubi = el.uiNextRubi;
                var uiNextName = el.uiNextName;
                var uiNextId = el.uiNextId;
                if (uiPrevRubi) uiPrevRubi.innerText = seg.prev.rubi;
                if (uiPrevName) uiPrevName.innerText = seg.prev.name;
                if (uiPrevId) uiPrevId.innerText = seg.prev.id;
                if (uiNextRubi) uiNextRubi.innerText = seg.next.rubi;
                if (uiNextName) uiNextName.innerText = seg.next.name;
                if (uiNextId) uiNextId.innerText = seg.next.id;
            }
        }

        // 市区町村ラベル（実測リバースジオコーディング優先・駅ベースはフォールバック）
        function updateCityLabel(km, coords, seg) {
            var uiCity = el.uiCityName;
            if (!uiCity) return;
            var cityStation = seg.stopped
                ? seg.stopped
                : ((Math.abs(km - seg.prev.km) <= Math.abs(seg.next.km - km)) ? seg.prev : seg.next);
            var cOk = coords && isFinite(coords[0]) && isFinite(coords[1]);
            var useGeo = geocodedCity && geocodeLatLng && cOk
                && getDistance(coords[0], coords[1], geocodeLatLng[0], geocodeLatLng[1]) < 1500;
            uiCity.innerText = useGeo ? geocodedCity : cityStation.city;
            if (cOk) updateCityFromCoords(coords[0], coords[1]);
        }

        // 速度計（GPSは実速度、デモは擬似速度）
        function updateSpeedo(km, speed) {
            var displaySpeed = speed !== null ? Math.round(speed) : (isDemoPlaying ? Math.floor(75 + Math.sin(km) * 12) : 0);
            var uiSpd = el.uiSpeed;
            if (uiSpd) uiSpd.innerText = displaySpeed;
        }

        // 地図（現在地マーカー・方位の平滑化・回転・自動追従）
        function updateMapView(coords, bearing, speed) {
            var coordsOk = coords && isFinite(coords[0]) && isFinite(coords[1]);

            // 方位の平滑化（停車/低速のブレ防止。デモは常に移動中扱い）
            var movingEnough = (currentMode === "demo") || (speed !== null && speed >= MOVING_SPEED_MIN);
            if (movingEnough && isFinite(bearing)) {
                var d = ((bearing - lastBearing + 540) % 360) - 180;
                lastBearing = (lastBearing + d * 0.25 + 360) % 360;
            }
            var useBearing = isFinite(lastBearing) ? lastBearing : 0;

            if (map && trainMarker && coordsOk) {
                trainMarker.setLatLng(coords);
                if (!isMapUserInteracting) {
                    var rotDeg = MAP_HEADING_UP ? -useBearing : 0;
                    var rotator = el.mapRotator;
                    if (rotator) rotator.style.transform = `rotate(${rotDeg}deg)`;
                    var markerIcons = document.querySelectorAll('.rotated-map .leaflet-marker-icon .fix-rotate');
                    markerIcons.forEach(function(icon) { icon.style.transform = `rotate(${-rotDeg}deg)`; });
                    map.setView(coords, map.getZoom(), { animate: false });
                }
            }
        }

        // 沿線スポットカードのハイライト＆最寄りスポットへの自動スライド
        function updateSpotHighlights(km) {
            var closestSpotId = null;
            var minDiff = Infinity;

            SPOT_IDS.forEach(function(id) {
                var s = SPOTS[parseInt(id.split("-")[1], 10)];
                var card = document.getElementById("card-" + id);
                if (!card || !s) return;
                var diff = (km >= s.kmStart && km <= s.kmEnd) ? 0
                           : Math.min(Math.abs(km - s.kmStart), Math.abs(km - s.kmEnd));
                if (diff < minDiff) { minDiff = diff; closestSpotId = "card-" + id; }

                if (diff < 2.5) {
                    card.className = "snap-center shrink-0 w-[210px] bg-appCard border border-blue-500 rounded-xl p-2.5 flex flex-col justify-between transition-all duration-300 scale-[1.02] opacity-100 relative group shadow-[0_0_12px_rgba(59,130,246,0.3)]";
                } else {
                    card.className = "snap-center shrink-0 w-[210px] bg-appCard border border-appBorder rounded-xl p-2.5 flex flex-col justify-between transition-all duration-300 opacity-80 relative group shadow-md shadow-slate-950/40";
                }
            });

            if (closestSpotId && minDiff < 3.0) {
                var activeCard = document.getElementById(closestSpotId);
                var container = el.scenicCardContainer;
                if (activeCard && container) {
                    var cardLeft = activeCard.offsetLeft;
                    var cardWidth = activeCard.clientWidth;
                    var containerWidth = container.clientWidth;
                    container.scrollTo({
                        left: cardLeft - (containerWidth / 2) + (cardWidth / 2),
                        behavior: 'smooth'
                    });
                }
            }
        }

        // 駅タイムライン（全駅をリセット → 現在地を強調 → 該当行へ自動スクロール）
        function updateStationTimeline(km, seg) {
            // すべての駅行をいったん通常状態に戻す
            document.querySelectorAll(".station-row").forEach(function(el) {
                el.classList.add("opacity-100");
                var nameEl = el.querySelector(".station-name");
                if (nameEl) nameEl.className = "station-name text-slate-200 font-bold text-xs pl-8";

                var dot = el.querySelector(".absolute.left-\\[12px\\]");
                if (dot) {
                    dot.className = "absolute left-[12px] -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-slate-400 z-10 border border-appDark";
                    dot.innerHTML = "";
                }
            });
            document.querySelectorAll(".section-row").forEach(function(el) { el.classList.add("hidden"); });

            if (seg.stopped) {
                var row = document.getElementById(`station-${seg.stopped.id}`);
                if (row) {
                    // 停車駅名をオレンジで強調（リセットの後に適用するので確実に反映される）
                    var stoppedName = row.querySelector(".station-name");
                    if (stoppedName) stoppedName.className = "station-name text-blue-400 font-black text-sm pl-8";

                    var dot = row.querySelector(".absolute.left-\\[12px\\]");
                    if (dot) {
                        dot.className = "absolute left-[12px] -translate-x-1/2 w-4 h-4 flex items-center justify-center z-10";
                        dot.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" style="display:block"><path d="M12 22 L4 5 L12 12 L20 5 Z" fill="#60a5fa"/></svg>`;
                    }
                }
            } else {
                var activeSection = document.getElementById(`section-${seg.prev.id}-${seg.next.id}`);
                if (activeSection) activeSection.classList.remove("hidden");

                var prevRow = document.getElementById(`station-${seg.prev.id}`);
                var nextRow = document.getElementById(`station-${seg.next.id}`);
                if (prevRow) {
                    var prevName = prevRow.querySelector(".station-name");
                    if (prevName) prevName.className = "station-name text-blue-400 font-black text-xs pl-8";
                }
                if (nextRow) {
                    var nextName = nextRow.querySelector(".station-name");
                    if (nextName) nextName.className = "station-name text-blue-400 font-black text-xs pl-8";
                }
            }

            var targetScrollRowId = seg.stopped ? `station-${seg.stopped.id}` : `station-${seg.next.id}`;
            var activeScrollElement = document.getElementById(targetScrollRowId);
            if (activeScrollElement) {
                requestAnimationFrame(function() {
                    var container = el.stationTimelineContainer;
                    if (container) {
                        var offset = activeScrollElement.offsetTop;
                        var containerHeight = container.clientHeight;
                        var elementHeight = activeScrollElement.clientHeight;
                        container.scrollTo({
                            top: offset - (containerHeight / 2) + (elementHeight / 2),
                            behavior: 'smooth'
                        });
                    }
                });
            }
        }

        // 💡 スポット個別カードの詳細表示切替
        function toggleCardDetails(id) {
            var shortDesc = document.getElementById(`desc-${id}-short`);
            var detailDesc = document.getElementById(`desc-${id}-detail`);
            var label = document.getElementById(`label-${id}`);
            var icon = document.getElementById(`icon-${id}`);
            var card = document.getElementById(`card-${id}`);

            if (detailDesc.classList.contains("hidden")) {
                // 詳細を開く
                detailDesc.classList.remove("hidden");
                if (shortDesc) shortDesc.classList.add("hidden");
                label.innerText = "折りたたむ";
                icon.className = "fa-solid fa-caret-up";
                
                // 一括格納バーを表示
                el.collapseAllBar.classList.remove("hidden");
                el.collapseAllBar.classList.add("flex");
            } else {
                // 詳細を閉じる
                detailDesc.classList.add("hidden");
                if (shortDesc) shortDesc.classList.remove("hidden");
                label.innerText = "詳細";
                icon.className = "fa-solid fa-caret-down";

                checkAnyCardExpanded();
            }

            // 中央寄せスライド
            var container = el.scenicCardContainer;
            if (container && card) {
                setTimeout(function() {
                    container.scrollTo({
                        left: card.offsetLeft - (container.clientWidth / 2) + (card.clientWidth / 2),
                        behavior: 'smooth'
                    });
                }, 100);
            }
        }

        // すべてのスポットカードを縦方向に折りたたむ
        function collapseAllScenicCards() {
            SPOT_IDS.forEach(function(id) {
                var shortDesc = document.getElementById(`desc-${id}-short`);
                var detailDesc = document.getElementById(`desc-${id}-detail`);
                var label = document.getElementById(`label-${id}`);
                var icon = document.getElementById(`icon-${id}`);

                if (detailDesc && !detailDesc.classList.contains("hidden")) {
                    detailDesc.classList.add("hidden");
                    if (shortDesc) shortDesc.classList.remove("hidden");
                    if (label) label.innerText = "詳細";
                    if (icon) icon.className = "fa-solid fa-caret-down";
                }
            });

            el.collapseAllBar.classList.add("hidden");
            el.collapseAllBar.classList.remove("flex");
        }

        // 他に開いているカードがないか確認し、一括格納バーの表示状態を制御
        function checkAnyCardExpanded() {
            var anyExpanded = false;
            SPOT_IDS.forEach(function(id) {
                var detailDesc = document.getElementById(`desc-${id}-detail`);
                if (detailDesc && !detailDesc.classList.contains("hidden")) {
                    anyExpanded = true;
                }
            });

            var bar = el.collapseAllBar;
            if (!anyExpanded && bar) {
                bar.classList.add("hidden");
                bar.classList.remove("flex");
            }
        }

        // 💡 地図のドラッグ操作時に追従モードを一時解除する仕組み
        function setupMapInteractionListeners() {
            if (!map) return;

            map.on('movestart', function(e) {
                if (map._touchActive || map._dragActive || e.gesture) {
                    triggerUserInteraction(true);
                }
            });

            var mapContainer = el.mapContainer;
            mapContainer.addEventListener('mousedown', function() { triggerUserInteraction(true); });
            mapContainer.addEventListener('touchstart', function() { triggerUserInteraction(true); });
        }

        // 💡 ユーザー操作時にゆっくり点滅するアニメーション(animate-pulse-soft)の着脱
        function triggerUserInteraction(state) {
            isMapUserInteracting = state;
            var warningPulse = el.trackingWarningPulse;
            
            if (state) {
                if (warningPulse) warningPulse.classList.add("animate-pulse-soft", "opacity-100");
            } else {
                if (warningPulse) warningPulse.classList.remove("animate-pulse-soft", "opacity-100");
            }
        }

        // 💡 追従復帰機能
        function resetMapTracking() {
            if (!map) return;
            
            triggerUserInteraction(false);

            var state = getCoordsByKm(currentKm);
            var b = isFinite(lastBearing) ? lastBearing : (state.bearing || 0);
            map.setView([state.lat, state.lng], 14, { animate: false });

            var rotDeg = MAP_HEADING_UP ? -b : 0;
            var rotator = el.mapRotator;
            if (rotator) {
                rotator.style.transform = `rotate(${rotDeg}deg)`;
            }
            var markerIcons = document.querySelectorAll('.rotated-map .leaflet-marker-icon .fix-rotate');
            markerIcons.forEach(function(icon) {
                icon.style.transform = `rotate(${-rotDeg}deg)`;
            });
        }

        // モード変更
        function setMode(mode) {
            currentMode = mode;
            
            var btnGps = el.toggleGps;
            var btnDemo = el.toggleDemo;
            var demoCtrl = el.demoCtrlBar;
            var gpsBadge = el.uiGpsBadge;

            if (mode === "gps") {
                btnGps.className = "px-2.5 py-0.5 rounded font-bold transition-all bg-railBlue text-white shadow";
                btnDemo.className = "px-2.5 py-0.5 rounded font-bold transition-all text-slate-400";
                demoCtrl.style.display = "none";
                if (gpsBadge) {
                    gpsBadge.innerText = "測位中";
                    gpsBadge.className = "text-[8px] font-bold text-amber-400 bg-amber-500/5 border border-amber-500/10 px-1 rounded w-full mt-0.5 text-center leading-none";
                }
                
                stopDemo();
                startGPSWatch();
            } else {
                btnGps.className = "px-2.5 py-0.5 rounded font-bold transition-all text-slate-400";
                btnDemo.className = "px-2.5 py-0.5 rounded font-bold transition-all bg-railBlue text-white shadow";
                demoCtrl.style.display = "flex";
                if (gpsBadge) {
                    gpsBadge.innerText = "デモ";
                    gpsBadge.className = "text-[8px] font-bold text-blue-400 bg-blue-500/5 border border-blue-500/10 px-1 rounded w-full mt-0.5 text-center leading-none";
                }

                stopGPSWatch();
                onDemoSliderChange(el.demoSlider.value);
            }

            if (map) {
                setTimeout(function() { map.invalidateSize(); }, 60);
            }
        }

        // GPS監視
        function startGPSWatch() {
            if (!navigator.geolocation) {
                showToast("GPS非対応デバイスです。デモに戻ります。", "error");
                setMode("demo");
                return;
            }

            showToast("GPS測位を開始します。屋外で使用すると正確な位置を示します。");

            watchId = navigator.geolocation.watchPosition(
                function(position) {
                    var lat = position.coords.latitude;
                    var lng = position.coords.longitude;
                    var rawSpeed = position.coords.speed;
                    var speedKmh = rawSpeed ? rawSpeed * 3.6 : null;

                    if (!isFinite(lat) || !isFinite(lng)) return;

                    var matched = mapMatchToTrack(lat, lng);
                    if (!matched || !isFinite(matched.lat) || !isFinite(matched.lng) || !isFinite(matched.km)) return;

                    var gpsBadge = el.uiGpsBadge;

                    if (matched.distance > GPS_OFFLINE_THRESHOLD_M) {
                        if (gpsBadge) {
                            gpsBadge.innerText = "沿線外";
                            gpsBadge.className = "text-[8px] font-bold text-slate-400 bg-slate-500/10 border border-slate-500/20 px-1 rounded w-full mt-0.5 text-center leading-none";
                        }
                        if (!gpsOfflineNotified) {
                            gpsOfflineNotified = true;
                            showToast("現在地が東海道線の沿線から離れています。沿線で使うと正しく表示されます。", "info");
                        }
                        return;
                    }
                    gpsOfflineNotified = false;

                    if (gpsBadge) {
                        gpsBadge.innerText = "GPS有効";
                        gpsBadge.className = "text-[8px] font-bold text-emerald-400 bg-emerald-500/5 border border-emerald-500/10 px-1 rounded w-full mt-0.5 text-center leading-none";
                    }

                    updateAppStatus(matched.km, [matched.lat, matched.lng], matched.bearing, speedKmh);
                },
                function(error) {
                    var errorMsg = "GPS取得エラー";
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg = "位置情報の利用許可がありません。";
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMsg = "位置が検出できません。";
                            break;
                        case error.TIMEOUT:
                            errorMsg = "位置情報の取得中にタイムアウトしました。";
                            break;
                    }
                    showToast(errorMsg + " デモモードに切り替えます。", "error");
                    setMode("demo");
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 1000,
                    timeout: 10000
                }
            );
        }

        function stopGPSWatch() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
        }

        // デモ再生
        function toggleDemoPlay() {
            var btn = el.btnPlayDemo;
            var icon = el.iconPlayDemo;
            
            if (isDemoPlaying) {
                stopDemo();
            } else {
                isDemoPlaying = true;
                icon.className = "fa-solid fa-pause text-[9px] text-white";
                btn.className = "w-6 h-6 bg-railOrange rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all";
                
                demoPlayInterval = setInterval(function() {
                    var km = parseFloat(el.demoSlider.value);
                    km += 0.15;
                    if (km > TOTAL_KM) {
                        km = 0;
                    }
                    el.demoSlider.value = km.toFixed(1);
                    onDemoSliderChange(km);
                }, 200);
            }
        }

        function stopDemo() {
            isDemoPlaying = false;
            if (demoPlayInterval) {
                clearInterval(demoPlayInterval);
                demoPlayInterval = null;
            }
            var btn = el.btnPlayDemo;
            var icon = el.iconPlayDemo;
            if (btn && icon) {
                icon.className = "fa-solid fa-play text-[9px] text-white";
                btn.className = "w-6 h-6 bg-railBlue rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all";
            }
        }

        function onDemoSliderChange(value) {
            var km = parseFloat(value);
            el.demoKmLabel.innerText = `${km.toFixed(1)}km`;
            
            var state = getCoordsByKm(km);
            updateAppStatus(km, [state.lat, state.lng], state.bearing);
        }

        // 初期ロード
        document.addEventListener("DOMContentLoaded", function() {
            cacheElements();   // 最初に要素参照をまとめて取得
            positionKmMajorLabels();
            initTimeline();

            // 地図ビュー
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false,
                scrollWheelZoom: true,
                dragging: true,
                touchZoom: true
            }).setView([trackPoints[0].lat, trackPoints[0].lng], 14);

            L.tileLayer(MAP_TILE_URL, {
                maxZoom: 19
            }).addTo(map);

            window.addEventListener('resize', function() { if (map) map.invalidateSize(); });
            window.addEventListener('orientationchange', function() {
                setTimeout(function() { if (map) map.invalidateSize(); }, 200);
            });
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', function() { if (map) map.invalidateSize(); });
            }
            setTimeout(function() { if (map) map.invalidateSize(); }, 300);

            // 超精密ポリライン全線の描画
            var trackCoords = trackPoints.map(function(p) { return [p.lat, p.lng]; });
            L.polyline(trackCoords, {
                color: (currentLine && currentLine.color) || '#2563eb',
                weight: 4.5,
                opacity: 0.85,
                lineJoin: 'round'
            }).addTo(map);

            // 現在地ブルードット
            var blueDotIcon = L.divIcon({
                html: `
                <div class="fix-rotate relative w-6 h-6 flex items-center justify-center">
                    <div class="absolute w-5 h-5 bg-blue-500 rounded-full opacity-35 animate-ping"></div>
                    <div class="relative w-3.5 h-3.5 bg-blue-600 rounded-full border-2 border-white shadow-[0_0_8px_rgba(59,130,246,0.9)] z-10"></div>
                </div>`,
                className: '',
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });
            trainMarker = L.marker([trackPoints[0].lat, trackPoints[0].lng], { icon: blueDotIcon }).addTo(map);

            // 沿線スポット（地図ピン＋カード）を SPOTS 配列から自動生成
            renderSpotMarkers();
            renderStationMarkers();
            renderSpotCards();

            // 手動ドラッグによる自動追従一時解除機能のセットアップ
            setupMapInteractionListeners();

            // デモスライダーの範囲を路線の総距離に合わせる（104.6 の直書きをやめる）
            var demoSlider = el.demoSlider;
            if (demoSlider && TOTAL_KM) demoSlider.max = TOTAL_KM;

            // 初期位置をセットして初期化
            setMode("demo");
        });
    </script>
</body>
</html>
